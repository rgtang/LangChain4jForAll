<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java AI Agent - 智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            border-color: #667eea;
        }

        #sendBtn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #sendBtn:active {
            transform: translateY(0);
        }

        #sendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            padding: 10px;
            color: #666;
            font-style: italic;
        }

        .typing-indicator.active {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Java AI Agent</h1>
            <p>智能助手 - 支持聊天、工具调用、知识库问答</p>
            <p style="font-size: 12px; opacity: 0.7; margin-top: 5px;">
                会话ID: <span id="sessionIdDisplay"></span>
            </p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="message-content">
                    你好！我是小智，你的 AI 助手。我可以帮你：<br>
                    1. 查询天气信息<br>
                    2. 查询时间日期<br>
                    3. 进行数学计算<br>
                    4. 回答公司相关问题<br>
                    5. 普通聊天对话<br><br>
                    有什么我可以帮你的吗？
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">AI 正在思考...</div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的问题..." />
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // 为每个浏览器窗口生成唯一的会话ID
        // 使用 sessionStorage 确保每个窗口/标签页都有独立的 sessionId
        let sessionId = sessionStorage.getItem('ai-session-id');
        if (!sessionId) {
            sessionId = 'session-' + Date.now() + '-' + Math.random().toString(36).substring(2, 15);
            sessionStorage.setItem('ai-session-id', sessionId);
        }
        console.log('当前会话ID:', sessionId);

        // 发送消息
        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 显示用户消息
            addMessage('user', message);
            userInput.value = '';

            // 禁用输入
            sendBtn.disabled = true;
            userInput.disabled = true;
            typingIndicator.classList.add('active');

            // 调用 SSE 接口
            streamChat(message);
        }

        // 流式聊天
        function streamChat(message) {
            // 创建 AI 消息容器
            const aiMessageDiv = document.createElement('div');
            aiMessageDiv.className = 'message assistant';
            const aiContentDiv = document.createElement('div');
            aiContentDiv.className = 'message-content';
            aiMessageDiv.appendChild(aiContentDiv);
            chatArea.appendChild(aiMessageDiv);
            scrollToBottom();

            // 使用 fetch 调用 SSE 接口
            fetch('/api/chat/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message,
                    sessionId: sessionId  // 传递会话ID
                })
            })
            .then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                function readStream() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            // 流结束
                            typingIndicator.classList.remove('active');
                            sendBtn.disabled = false;
                            userInput.disabled = false;
                            userInput.focus();
                            return;
                        }

                        // 解码文本
                        buffer += decoder.decode(value, { stream: true });

                        // 解析 SSE 格式：data: xxx\n\n
                        const lines = buffer.split('\n');
                        buffer = lines.pop(); // 保留不完整的行

                        for (const line of lines) {
                            if (line.startsWith('data:')) {
                                // 提取 data: 后面的内容
                                const content = line.substring(5).trim();
                                if (content) {
                                    aiContentDiv.textContent += content;
                                    scrollToBottom();
                                }
                            }
                        }

                        // 继续读取
                        readStream();
                    });
                }

                readStream();
            })
            .catch(error => {
                console.error('Error:', error);
                aiContentDiv.textContent = '抱歉，发生了错误，请稍后重试。';
                typingIndicator.classList.remove('active');
                sendBtn.disabled = false;
                userInput.disabled = false;
            });
        }

        // 添加消息
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            scrollToBottom();
        }

        // 滚动到底部
        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 事件监听
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // 页面加载完成后聚焦输入框
        window.addEventListener('load', () => {
            userInput.focus();
            // 显示会话ID
            document.getElementById('sessionIdDisplay').textContent = sessionId;
        });
    </script>
</body>
</html>
